<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlackJack Trainer</title>
    <meta
      name="description"
      content="Jeu de blackjack pour s'entrainer au comptage de cartes Hi-Lo et aux decisions de table."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell" id="app">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Blackjack & comptage</p>
          <h1>BlackJack Trainer</h1>
        </div>
        <div class="session-strip" aria-label="Etat de la session">
          <div class="metric">
            <span class="metric-label">Bankroll</span>
            <strong id="bankrollMetric">1 000</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Mise</span>
            <strong id="betMetric">5</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Net</span>
            <strong id="netMetric">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Round</span>
            <strong id="roundMetric">0</strong>
          </div>
        </div>
      </header>

      <main class="table-grid">
        <section class="table-felt" aria-label="Table de blackjack">
          <div class="dealer-zone">
            <div class="zone-heading">
              <div>
                <span class="section-label">Dealer</span>
                <strong id="dealerScore">0</strong>
              </div>
              <span class="phase-pill" id="phasePill">Mise</span>
            </div>
            <div class="card-row dealer-cards" id="dealerCards" aria-live="polite"></div>
          </div>

          <div class="player-zone">
            <div class="zone-heading">
              <div>
                <span class="section-label">Joueur</span>
                <strong id="playerSummary">Place ta mise</strong>
              </div>
            </div>
            <div class="hands-grid" id="playerHands" aria-live="polite"></div>
          </div>
          <div class="round-burst" id="roundBurst" aria-live="polite"></div>
        </section>

        <aside class="control-rail" aria-label="Commandes de jeu">
          <section class="panel bet-panel">
            <div class="panel-heading">
              <h2>Mise</h2>
              <button class="icon-button" id="repeatBetButton" type="button" title="Rejouer la derniere mise" aria-label="Rejouer la derniere mise">
                <span aria-hidden="true">↺</span>
              </button>
            </div>
            <label class="field-label" for="betInput">Montant</label>
            <div class="bet-row">
              <input id="betInput" type="number" min="5" max="500" step="5" value="25">
              <button class="primary-button" id="dealButton" type="button">Distribuer</button>
            </div>
            <div class="chip-row" aria-label="Jetons rapides">
              <button class="chip chip-5" type="button" data-chip="5">5</button>
              <button class="chip chip-25" type="button" data-chip="25">25</button>
              <button class="chip chip-100" type="button" data-chip="100">100</button>
              <button class="chip chip-500" type="button" data-chip="500">500</button>
            </div>
            <button class="ghost-button" id="clearBetButton" type="button">Effacer</button>
          </section>

          <section class="panel action-panel">
            <div class="panel-heading">
              <h2>Actions</h2>
            </div>
            <div class="action-grid">
              <button id="hitButton" type="button">Tirer</button>
              <button id="standButton" type="button">Rester</button>
              <button id="doubleButton" type="button">Doubler</button>
              <button id="splitButton" type="button">Split</button>
              <button id="surrenderButton" type="button">Abandon</button>
            </div>
            <div class="insurance-row" id="insuranceRow" hidden>
              <button id="insuranceButton" type="button">Assurance</button>
              <button id="skipInsuranceButton" type="button">Passer</button>
            </div>
          </section>

          <section class="panel count-panel">
            <div class="panel-heading">
              <h2>Count trainer</h2>
              <span id="countSystemBadge" class="small-badge">Hi-Lo</span>
            </div>
            <button class="hold-button" id="revealCountButton" type="button" aria-pressed="false">
              Maintenir pour reveler
            </button>
            <div class="count-lock">
              <span>Relache: infos masquees</span>
            </div>
            <div class="count-reveal" id="countReveal" aria-live="polite">
              <div class="count-metrics">
                <div>
                  <span>Running</span>
                  <strong id="runningCount">0</strong>
                </div>
                <div>
                  <span>True</span>
                  <strong id="trueCount">0</strong>
                </div>
                <div>
                  <span>Sabot</span>
                  <strong id="decksRemaining">0</strong>
                </div>
                <div>
                  <span>Pen.</span>
                  <strong id="penetrationMetric">0%</strong>
                </div>
              </div>
              <div class="density-grid">
                <div>
                  <span>Hautes</span>
                  <strong id="highDensity">0%</strong>
                </div>
                <div>
                  <span>Basses</span>
                  <strong id="lowDensity">0%</strong>
                </div>
                <div>
                  <span>Non vues</span>
                  <strong id="hiddenRemoved">0</strong>
                </div>
                <div>
                  <span>Signal</span>
                  <strong id="countAgreement">Neutre</strong>
                </div>
              </div>
              <div class="rank-bars" id="rankBars" aria-label="Composition exacte du sabot"></div>
            </div>
          </section>

          <section class="panel settings-panel">
            <div class="panel-heading">
              <h2>Parametres</h2>
            </div>
            <div class="settings-grid">
              <label>
                Sabots
                <select id="deckCountSelect">
                  <option value="1">1 deck</option>
                  <option value="2">2 decks</option>
                  <option value="4">4 decks</option>
                  <option value="6" selected>6 decks</option>
                  <option value="8">8 decks</option>
                </select>
              </label>
              <label>
                Systeme
                <select id="countSystemSelect"></select>
              </label>
              <label>
                Penetration
                <input id="penetrationInput" type="number" min="50" max="90" step="5" value="75">
              </label>
              <label>
                Max table
                <input id="tableMaxInput" type="number" min="50" max="5000" step="50" value="500">
              </label>
            </div>
            <div class="toggle-list">
              <label><input id="soft17Toggle" type="checkbox"> Dealer tire soft 17</label>
              <label><input id="dasToggle" type="checkbox" checked> Double apres split</label>
              <label><input id="surrenderToggle" type="checkbox" checked> Abandon tardif</label>
              <label><input id="soundToggle" type="checkbox" checked> Sons</label>
            </div>
            <div class="rule-buttons">
              <button class="ghost-button" id="newShoeButton" type="button">Nouveau sabot</button>
              <button class="ghost-button" id="resetSessionButton" type="button">Reset session</button>
            </div>
          </section>
        </aside>
      </main>

      <footer class="log-strip" aria-label="Historique">
        <div id="messageLog"></div>
      </footer>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
