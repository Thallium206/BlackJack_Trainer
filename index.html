<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlackJack Trainer</title>
    <meta
      name="description"
      content="Jeu de blackjack pour s'entrainer au comptage de cartes Hi-Lo et aux decisions de table."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell" id="app">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Blackjack & comptage</p>
          <h1>BlackJack Trainer</h1>
        </div>
        <div class="session-strip" aria-label="Etat de la session">
          <div class="metric">
            <span class="metric-label">Bankroll</span>
            <strong id="bankrollMetric">1 000</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Mise</span>
            <strong id="betMetric">5</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Net</span>
            <strong id="netMetric">0</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Round</span>
            <strong id="roundMetric">0</strong>
          </div>
        </div>
      </header>

      <main class="table-grid">
        <section class="table-felt" aria-label="Table de blackjack">
          <div class="dealer-zone">
            <div class="zone-heading">
              <div>
                <span class="section-label">Dealer</span>
                <strong id="dealerScore">0</strong>
              </div>
              <span class="phase-pill" id="phasePill">Mise</span>
            </div>
            <div class="card-row dealer-cards" id="dealerCards" aria-live="polite"></div>
          </div>

          <div class="player-zone">
            <div class="zone-heading">
              <div>
                <span class="section-label">Joueur</span>
                <strong id="playerSummary">Place ta mise</strong>
              </div>
            </div>
            <div class="hands-grid" id="playerHands" aria-live="polite"></div>
          </div>
          <div class="round-burst" id="roundBurst" aria-live="polite"></div>
        </section>

        <aside class="control-rail" aria-label="Commandes de jeu">
          <section class="panel bet-panel">
            <div class="panel-heading">
              <h2>Mise</h2>
              <button class="icon-button tip-target" id="repeatBetButton" type="button" title="Rejouer la derniere mise" aria-label="Rejouer la derniere mise" data-tooltip="Reprend automatiquement le dernier montant mise. Utile pour enchainer les mains sans retaper la mise.">
                <span aria-hidden="true">↺</span>
              </button>
            </div>
            <label class="field-label" for="betInput">Montant</label>
            <div class="bet-row">
              <input class="tip-target" id="betInput" type="number" min="5" max="500" step="5" value="25" data-tooltip="Ta mise de depart pour la main. Elle est retiree de la bankroll au moment de la distribution.">
              <button class="primary-button tip-target" id="dealButton" type="button" data-tooltip="Distribue deux cartes au joueur et deux au dealer. Une carte dealer reste cachee jusqu'a la resolution.">Distribuer</button>
            </div>
            <div class="chip-row" aria-label="Jetons rapides">
              <button class="chip chip-5" type="button" data-chip="5" title="Ajoute 5 credits a la mise">5</button>
              <button class="chip chip-25" type="button" data-chip="25" title="Ajoute 25 credits a la mise">25</button>
              <button class="chip chip-100" type="button" data-chip="100" title="Ajoute 100 credits a la mise">100</button>
              <button class="chip chip-500" type="button" data-chip="500" title="Ajoute 500 credits a la mise">500</button>
            </div>
            <button class="ghost-button tip-target" id="clearBetButton" type="button" data-tooltip="Remet la mise a zero avant la prochaine distribution.">Effacer</button>
          </section>

          <section class="panel action-panel">
            <div class="panel-heading">
              <h2>Actions</h2>
            </div>
            <div class="action-grid">
              <button class="tip-target" id="hitButton" type="button" data-tooltip="Tirer: ajoute une carte a ta main. Si tu depasses 21, la main bust et la mise est perdue.">Tirer</button>
              <button class="tip-target" id="standButton" type="button" data-tooltip="Rester: garde ta main telle quelle. Le dealer joue ensuite quand toutes tes mains sont terminees.">Rester</button>
              <button class="tip-target" id="doubleButton" type="button" data-tooltip="Doubler: double la mise, prend une seule carte supplementaire, puis la main s'arrete. Disponible au debut de la main.">Doubler</button>
              <button class="tip-target" id="splitButton" type="button" data-tooltip="Split: si tes deux cartes ont meme valeur, cree deux mains separees avec une mise identique sur chaque main.">Split</button>
              <button class="tip-target" id="surrenderButton" type="button" data-tooltip="Abandon tardif: rend la moitie de la mise et termine la main. Disponible seulement au debut si la regle est active.">Abandon</button>
            </div>
            <div class="insurance-row" id="insuranceRow" hidden>
              <button class="tip-target" id="insuranceButton" type="button" data-tooltip="Assurance: pari secondaire egal a la moitie de la mise. Il paie 2:1 si le dealer a blackjack avec son As visible.">Assurance</button>
              <button class="tip-target" id="skipInsuranceButton" type="button" data-tooltip="Passer l'assurance et continuer la main normalement.">Passer</button>
            </div>
          </section>

          <section class="panel count-panel">
            <div class="panel-heading">
              <h2>Count trainer</h2>
              <span id="countSystemBadge" class="small-badge tip-target" tabindex="0" data-tooltip="Systeme de comptage actif. Change-le dans Parametres pour comparer Hi-Lo, KO, Hi-Opt I, Omega II ou Zen.">Hi-Lo</span>
            </div>
            <div class="count-status tip-target" tabindex="0" data-tooltip="Le count trainer est visible en continu. Compare le count a la composition exacte du sabot pour entrainer ton estimation.">
              <span>Count live</span>
              <strong>Visible</strong>
            </div>
            <div class="count-reveal" id="countReveal" aria-live="polite">
              <div class="count-metrics">
                <div class="tip-target" tabindex="0" data-tooltip="Running count: somme brute des valeurs de comptage des cartes deja vues depuis le dernier melange.">
                  <span>Running</span>
                  <strong id="runningCount">0</strong>
                </div>
                <div class="tip-target" tabindex="0" data-tooltip="True count: running count divise par le nombre de decks restants. C'est l'indicateur le plus utile pour ajuster les mises.">
                  <span>True</span>
                  <strong id="trueCount">0</strong>
                </div>
                <div class="tip-target" tabindex="0" data-tooltip="Estimation du nombre de decks encore dans le sabot. Plus ce nombre baisse, plus le true count devient sensible.">
                  <span>Sabot</span>
                  <strong id="decksRemaining">0</strong>
                </div>
                <div class="tip-target" tabindex="0" data-tooltip="Penetration: part du sabot deja consommee. Le sabot se remelange quand le seuil configure est atteint.">
                  <span>Pen.</span>
                  <strong id="penetrationMetric">0%</strong>
                </div>
              </div>
              <div class="density-grid">
                <div class="tip-target" tabindex="0" data-tooltip="Pourcentage de cartes hautes restantes: 10, Valets, Dames, Rois et As. Plus il est haut, plus le sabot favorise le joueur.">
                  <span>Hautes</span>
                  <strong id="highDensity">0%</strong>
                </div>
                <div class="tip-target" tabindex="0" data-tooltip="Pourcentage de petites cartes restantes: 2 a 6. Beaucoup de petites cartes restantes est moins favorable au joueur.">
                  <span>Basses</span>
                  <strong id="lowDensity">0%</strong>
                </div>
                <div class="tip-target" tabindex="0" data-tooltip="Cartes sorties du sabot mais pas encore visibles pour le count, typiquement la carte cachee du dealer avant reveal.">
                  <span>Non vues</span>
                  <strong id="hiddenRemoved">0</strong>
                </div>
                <div class="tip-target" tabindex="0" data-tooltip="Compare le signal du count avec la composition exacte du sabot. Alignee = le count raconte bien ce que le sabot contient.">
                  <span>Signal</span>
                  <strong id="countAgreement">Neutre</strong>
                </div>
              </div>
              <div class="rank-bars" id="rankBars" aria-label="Composition exacte du sabot"></div>
            </div>
          </section>

          <section class="panel settings-panel">
            <div class="panel-heading">
              <h2>Parametres</h2>
            </div>
            <div class="settings-grid">
              <label>
                Sabots
                <select class="tip-target" id="deckCountSelect" data-tooltip="Nombre de decks dans le sabot. Les tables casino utilisent souvent 6 ou 8 decks.">
                  <option value="1">1 deck</option>
                  <option value="2">2 decks</option>
                  <option value="4">4 decks</option>
                  <option value="6" selected>6 decks</option>
                  <option value="8">8 decks</option>
                </select>
              </label>
              <label>
                Systeme
                <select class="tip-target" id="countSystemSelect" data-tooltip="Technique de comptage utilisee pour valoriser les cartes vues. Hi-Lo est le standard pour debuter."></select>
              </label>
              <label>
                Penetration
                <input class="tip-target" id="penetrationInput" type="number" min="50" max="90" step="5" value="75" data-tooltip="Pourcentage du sabot joue avant remelange automatique. 75 signifie qu'environ trois quarts du sabot sont utilises.">
              </label>
              <label>
                Max table
                <input class="tip-target" id="tableMaxInput" type="number" min="50" max="5000" step="50" value="500" data-tooltip="Mise maximale autorisee a la table.">
              </label>
            </div>
            <div class="toggle-list">
              <label class="tip-target" data-tooltip="Soft 17: main dealer contenant un As compte comme 7 (17 soft). Si actif, le dealer tire encore sur soft 17."><input id="soft17Toggle" type="checkbox"> Dealer tire soft 17</label>
              <label class="tip-target" data-tooltip="Permet de doubler une main qui vient d'etre creee par un split."><input id="dasToggle" type="checkbox" checked> Double apres split</label>
              <label class="tip-target" data-tooltip="Permet d'abandonner au debut de la main et de recuperer la moitie de la mise si le dealer n'a pas blackjack."><input id="surrenderToggle" type="checkbox" checked> Abandon tardif</label>
              <label class="tip-target" data-tooltip="Active ou coupe les petits effets sonores du jeu."><input id="soundToggle" type="checkbox" checked> Sons</label>
            </div>
            <div class="rule-buttons">
              <button class="ghost-button tip-target" id="newShoeButton" type="button" data-tooltip="Melange un nouveau sabot et remet le count a zero sans remettre la bankroll a zero.">Nouveau sabot</button>
              <button class="ghost-button tip-target" id="resetSessionButton" type="button" data-tooltip="Remet la bankroll, les statistiques, la manche et le sabot a leur etat initial.">Reset session</button>
            </div>
          </section>
        </aside>
      </main>

      <footer class="log-strip" aria-label="Historique">
        <div id="messageLog"></div>
      </footer>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
